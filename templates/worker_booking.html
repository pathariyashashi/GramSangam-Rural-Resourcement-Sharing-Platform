<!DOCTYPE html>
<html>
<head>
    <title>Hire Worker | GramSangam</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fa;
        }

        .booking-card{
            max-width:700px;
            margin:auto;
            margin-top:50px;
            border:none;
            border-radius:20px;
        }
    </style>

</head>
<body>

<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">
            🌾 GramSangam
        </a>
    </div>
</nav>

<div class="container">

    <div class="card shadow booking-card">

        <div class="card-body p-4">

            <h2 class="text-center mb-4">
                👨‍🌾 Hire Worker Request
            </h2>

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text"
                           name="customer_name"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Mobile Number</label>
                    <input type="text"
                           name="mobile"
                           class="form-control"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Village / Address</label>
                    <textarea name="village"
                              class="form-control"
                              rows="3"
                              required></textarea>
                </div>

            
                <div class="mb-3">
                    <label class="form-label">Work Date</label>
                    <input type="date"
                           name="work_date"
                           class="form-control"
                           required>
                </div>
                <div class="mb-3">

    <label class="form-label">
        Days Required
    </label>

    <input
        type="number"
        name="days_required"
        class="form-control"
        min="1"
        required>

</div>

                <button class="btn btn-success w-100">
                    Send Hire Request
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
