<!DOCTYPE html>
<html>
<head>

<title>Login | GramSangam</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f7fa;
}

.login-card{
    max-width:500px;
    margin:auto;
    margin-top:100px;
    border:none;
    border-radius:20px;
}

</style>

</head>

<body>

<div class="container">

<div class="card shadow login-card">

<div class="card-body p-5">

<h2 class="text-center mb-4">
🌾 Login
</h2>

<form method="POST">

{% csrf_token %}

<input
type="email"
name="email"
class="form-control mb-3"
placeholder="Email Address"
required>

<input
type="password"
name="password"
class="form-control mb-3"
placeholder="Password"
required>


<div class="mb-3">

<label class="form-label fw-bold">
Login As
</label>

<select
name="login_type"
class="form-select mb-3"
required>

    <option value="">Select Login Type</option>

    <option value="Customer">
        Customer Login
    </option>

    <option value="Owner">
        Owner Login
    </option>

</select>

</div>

<button
type="submit"
class="btn btn-success w-100">

Login

</button>

</form>

<hr>

<p class="text-center">

Don't have an account?

<a href="{% url 'register' %}">
Register
</a>

</p>

</div>

</div>

</div>

</body>
</html>
