<!DOCTYPE html>
<html>
<head>
<title>Add Worker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<div class="card shadow p-4">

<h2 class="mb-4">
👨‍🌾 Add Worker
</h2>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<input
type="text"
name="name"
class="form-control mb-3"
placeholder="Worker Name"
required>

<select
name="skill"
class="form-select mb-3"
required>

<option value="">Select Skill</option>

<option value="Gehu Katai">Gehu Katai</option>
<option value="Dhaan Katai">Dhaan Katai</option>
<option value="Moong Katai">Moong Katai</option>
<option value="Chana Katai">Chana Katai</option>
<option value="Threshing Worker">Threshing Worker</option>
<option value="Loading Worker">Loading Worker</option>
<option value="Unloading Worker">Unloading Worker</option>
<option value="Lakdi Katai">Lakdi Katai</option>
<option value="Tractor Driver">Tractor Driver</option>
<option value="Harvester Operator">Harvester Operator</option>
<option value="Spraying Worker">Spraying Worker</option>
<option value="Farm Labour">Farm Labour</option>

</select>

<input
type="text"
name="mobile"
class="form-control mb-3"
placeholder="Mobile Number"
required>

<input
type="text"
name="location"
class="form-control mb-3"
placeholder="Village / Location"
required>

<input
type="number"
name="experience"
class="form-control mb-3"
placeholder="Experience (Years)"
required>

<input
type="number"
name="wage_per_day"
class="form-control mb-3"
placeholder="Wage Per Day"
required>

<textarea
name="description"
class="form-control mb-3"
rows="4"
placeholder="Worker Description"
required></textarea>

<input
type="file"
name="image"
class="form-control mb-3">

<button
type="submit"
class="btn btn-success w-100">

Add Worker

</button>

</form>

</div>

</div>

</body>
</html>
