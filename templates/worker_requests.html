<!DOCTYPE html>
<html>
<head>

<title>Worker Requests</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>
Worker Hire Requests
</h2>

<table class="table table-bordered">

<tr>

<th>Farmer</th>
<th>Mobile</th>
<th>Village</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>

</tr>

{% for r in requests %}

<tr>

<td>{{ r.customer_name }}</td>
<td>{{ r.mobile }}</td>
<td>{{ r.village }}</td>
<td>{{ r.work_date }}</td>
<td>{{ r.booking_status }}</td>

<td>
<td>

<form action="{% url 'accept_worker_request' r.id %}" method="post" style="display:inline;">
    {% csrf_token %}
    <button type="submit" class="btn btn-success btn-sm">
        Accept
    </button>
</form>

<form action="{% url 'reject_worker_request' r.id %}" method="post" style="display:inline;">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger btn-sm">
        Reject
    </button>
</form>

</td>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
