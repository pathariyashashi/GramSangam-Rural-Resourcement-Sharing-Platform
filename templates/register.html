<!DOCTYPE html>
<html>
<head>

<title>Register | GramSangam</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f7fa;
}

.register-card{
    max-width:650px;
    margin:auto;
    margin-top:50px;
    border:none;
    border-radius:20px;
}

</style>

</head>

<body>

<div class="container">

<div class="card shadow register-card">

<div class="card-body p-5">

<h2 class="text-center mb-4">
🌾 Create Account
</h2>

{% if error %}
<div class="alert alert-danger">
{{ error }}
</div>
{% endif %}

<form method="POST">

{% csrf_token %}

<input
type="text"
name="name"
class="form-control mb-3"
placeholder="Full Name"
required>

<input
type="email"
name="email"
class="form-control mb-3"
placeholder="Email Address"
required>

<input
type="text"
name="mobile"
class="form-control mb-3"
placeholder="Mobile Number"
required>

<select name="role"
class="form-select mb-3"
required>

<option value="">
Select Account Type
</option>

<option value="Customer">
Customer
</option>

<option value="Owner">
Owner
</option>

</select>

<input
type="text"
name="aadhaar"
class="form-control mb-3"
placeholder="Aadhaar Number"
required>

<input
type="text"
name="village"
class="form-control mb-3"
placeholder="Village / City"
required>

<textarea
name="address"
class="form-control mb-3"
rows="3"
placeholder="Address"
required></textarea>
 
<input
type="text"
name="business_name"
class="form-control mb-3"
placeholder="Business / Team Name (Optional)">

<input
type="password"
name="password"
class="form-control mb-3"
placeholder="Password"
required>

<input
type="password"
name="confirm_password"
class="form-control mb-3"
placeholder="Confirm Password"
required>

<button
type="submit"
class="btn btn-success w-100">

Register

</button>

</form>

<hr>

<p class="text-center">

Already have an account?

<a href="{% url 'login' %}">
Login
</a>

</p>

</div>

</div>

</div>

</body>
</html>
