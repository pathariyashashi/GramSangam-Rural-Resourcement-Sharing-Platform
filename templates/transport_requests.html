<!DOCTYPE html>
<html>
<head>

<title>Transport Requests</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>🚚 Transport Requests</h2>

<table class="table table-bordered">

<tr>

<th>Customer</th>
<th>Mobile</th>
<th>Pickup</th>
<th>Drop</th>
<th>Date</th>
<th>Status</th>
<th>Action</th>

</tr>

{% for r in requests %}

<tr>

<td>{{ r.customer_name }}</td>
<td>{{ r.mobile }}</td>
<td>{{ r.pickup_location }}</td>
<td>{{ r.drop_location }}</td>
<td>{{ r.booking_date }}</td>
<td>{{ r.booking_status }}</td>

<td>

<form action="{% url 'accept_transport_request' r.id %}" method="post" style="display:inline;">
{% csrf_token %}
<button class="btn btn-success btn-sm">
Accept
</button>
</form>

<form action="{% url 'reject_transport_request' r.id %}" method="post" style="display:inline;">
{% csrf_token %}
<button class="btn btn-danger btn-sm">
Reject
</button>
</form>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
