<!DOCTYPE html>
<html>
<head>

<title>My Workers</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-success">
<div class="container">

<a class="navbar-brand">
🌾 My Workers
</a>

<a href="{% url 'owner_dashboard' %}"
class="btn btn-light">
Dashboard
</a>

</div>
</nav>

<div class="container mt-5">

<h2 class="mb-4">
My Workers
</h2>

<div class="row">

{% for worker in workers %}

<div class="col-md-4">

<div class="card shadow mb-4">

{% if worker.image %}
<img src="{{ worker.image.url }}"
style="height:250px;object-fit:cover;">
{% endif %}

<div class="card-body">

<h4>{{ worker.name }}</h4>

<p>
Skill:
{{ worker.skill }}
</p>

<p>
Location:
{{ worker.location }}
</p>

<p>
Experience:
{{ worker.experience }} Years
</p>

<p>
₹{{ worker.wage_per_day }}/Day
</p>

</div>

</div>

</div>

{% empty %}

<div class="alert alert-warning">

No Workers Added Yet

</div>

{% endfor %}

</div>

</div>

</body>
</html>
